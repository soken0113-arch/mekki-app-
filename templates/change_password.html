<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="めっき受注">
  <link rel="apple-touch-icon" href="/static/icon-180.png">
  <link rel="manifest" href="/static/manifest.json">
  <title>パスワード変更 | めっき受注管理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f2f5; }

    nav {
      background: #1a3a5c; color: #fff;
      padding: 0 24px; display: flex; align-items: center;
      height: 52px; gap: 24px;
    }
    nav .nav-brand { font-size: 1rem; font-weight: 700; letter-spacing: 1px; }
    nav a { color: #cbd5e1; text-decoration: none; font-size: 0.88rem; }
    nav a:hover, nav a.active { color: #fff; border-bottom: 2px solid #60a5fa; padding-bottom: 2px; }

    .page { padding: 32px 16px; }
    .container { max-width: 440px; margin: 0 auto; }
    h1 { font-size: 1.5rem; color: #1a3a5c; margin-bottom: 24px; }

    .card {
      background: #fff; border-radius: 12px; padding: 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
    }

    .flash {
      padding: 12px 16px; border-radius: 8px; margin-bottom: 20px;
      font-size: 0.9rem; display: flex; align-items: center; gap: 8px;
    }
    .flash.success { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
    .flash.error   { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }

    .form-group { margin-bottom: 20px; }
    label {
      display: block; font-size: 0.85rem; font-weight: 600;
      color: #444; margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%; padding: 10px 12px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 0.95rem; color: #333; background: #fafafa;
    }
    input[type="password"]:focus { outline: none; border-color: #2563eb; background: #fff; }

    .hint { font-size: 0.78rem; color: #94a3b8; margin-top: 4px; }

    .actions { display: flex; gap: 12px; margin-top: 8px; }
    .btn-submit {
      flex: 1; padding: 12px; background: #1a3a5c; color: #fff;
      border: none; border-radius: 8px; font-size: 1rem;
      cursor: pointer; font-weight: 700;
    }
    .btn-submit:hover { background: #16304e; }
    .btn-cancel {
      flex: 1; padding: 12px; background: #f1f5f9; color: #555;
      border: none; border-radius: 8px; font-size: 1rem;
      cursor: pointer; text-decoration: none; text-align: center;
    }
    .btn-cancel:hover { background: #e2e8f0; }
  </style>
</head>
<body>
  <nav>
    <span class="nav-brand">めっき受注管理</span>
    <a href="/">受注一覧</a>
    <a href="/customers">顧客マスタ</a>
    <a href="/products">品名マスタ</a>
    <span style="margin-left:auto; font-size:0.82rem; color:#94a3b8;">{{ session.username }}</span>
    <a href="/logout" style="font-size:0.82rem; color:#94a3b8;">ログアウト</a>
  </nav>

  <div class="page">
    <div class="container">
      <h1>パスワード変更</h1>

      {% if error %}
      <div class="flash error">✕ {{ error }}</div>
      {% endif %}
      {% if success %}
      <div class="flash success">✓ {{ success }}</div>
      {% endif %}

      <div class="card">
        <form method="post" action="/change-password">
          <div class="form-group">
            <label>現在のパスワード</label>
            <input type="password" name="current_password" required autofocus
                   autocomplete="current-password">
          </div>
          <div class="form-group">
            <label>新しいパスワード</label>
            <input type="password" name="new_password" required
                   autocomplete="new-password">
            <p class="hint">※ 6文字以上で入力してください</p>
          </div>
          <div class="form-group">
            <label>新しいパスワード（確認）</label>
            <input type="password" name="confirm_password" required
                   autocomplete="new-password">
          </div>
          <div class="actions">
            <a href="/" class="btn-cancel">キャンセル</a>
            <button type="submit" class="btn-submit">変更する</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
