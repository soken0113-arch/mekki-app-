<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="めっき受注">
  <link rel="apple-touch-icon" href="/static/icon-180.png">
  <link rel="manifest" href="/static/manifest.json">
  <title>ログイン | めっき受注管理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .login-wrap {
      width: 100%;
      max-width: 380px;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a3a5c;
      letter-spacing: 2px;
    }
    .logo-sub {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 4px;
      letter-spacing: 1px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 36px 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
    }

    .card h1 {
      font-size: 1.1rem;
      color: #1a3a5c;
      margin-bottom: 24px;
      text-align: center;
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #333;
      background: #fafafa;
      transition: border-color 0.15s;
    }
    input:focus {
      outline: none;
      border-color: #2563eb;
      background: #fff;
    }

    .error {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.88rem;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: #1a3a5c;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .btn-login:hover { background: #16304e; }
    .btn-login:active { background: #122840; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="logo">
      <div class="logo-title">めっき受注管理</div>
      <div class="logo-sub">MEKKI ORDER MANAGEMENT</div>
    </div>

    <div class="card">
      <h1>ログイン</h1>

      {% if error %}
      <div class="error">✕ {{ error }}</div>
      {% endif %}

      <form method="post" action="/login">
        <div class="form-group">
          <label for="username">ユーザー名</label>
          <input type="text" id="username" name="username" required autofocus
                 autocomplete="username" placeholder="ユーザー名を入力">
        </div>
        <div class="form-group">
          <label for="password">パスワード</label>
          <input type="password" id="password" name="password" required
                 autocomplete="current-password" placeholder="パスワードを入力">
        </div>
        <button type="submit" class="btn-login">ログイン</button>
      </form>
    </div>
  </div>
</body>
</html>
