<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="めっき受注">
  <link rel="apple-touch-icon" href="/static/icon-180.png">
  <link rel="manifest" href="/static/manifest.json">
  <title>受注編集 | めっき受注管理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f2f5; padding: 32px 16px; }
    .container { max-width: 560px; margin: 0 auto; }

    .header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
    .btn-back {
      padding: 7px 14px; background: #f1f5f9; color: #555;
      border: none; border-radius: 6px; font-size: 0.88rem;
      cursor: pointer; text-decoration: none;
    }
    .btn-back:hover { background: #e2e8f0; }
    h1 { font-size: 1.4rem; color: #1a3a5c; }

    .order-no { font-size: 0.82rem; color: #888; margin-bottom: 20px; }

    .card { background: #fff; border-radius: 12px; padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,.08); }

    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.85rem; font-weight: 600;
            color: #444; margin-bottom: 6px; }
    input[type="text"], input[type="number"], input[type="date"],
    select, textarea {
      width: 100%; padding: 10px 12px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 0.95rem; color: #333;
      background: #fafafa;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: #2563eb; background: #fff;
    }
    textarea { resize: vertical; min-height: 80px; }
    .required { color: #e53e3e; margin-left: 2px; }

    .actions { display: flex; gap: 12px; margin-top: 24px; }
    .btn-submit {
      flex: 1; padding: 12px; background: #2563eb; color: #fff;
      border: none; border-radius: 8px; font-size: 1rem;
      cursor: pointer; font-weight: 600;
    }
    .btn-submit:hover { background: #1d4ed8; }
    .btn-cancel {
      flex: 1; padding: 12px; background: #f1f5f9; color: #555;
      border: none; border-radius: 8px; font-size: 1rem;
      cursor: pointer; text-decoration: none; text-align: center;
    }
    .btn-cancel:hover { background: #e2e8f0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="/detail/{{ order.id }}" class="btn-back">← 詳細に戻る</a>
      <h1>受注編集</h1>
    </div>

    <div class="card">
      <div class="order-no">受注番号：{{ order.order_no }}</div>

      <form method="post" action="/edit/{{ order.id }}">

        <div class="form-group">
          <label>顧客名 <span class="required">*</span></label>
          {% if customers %}
          <select name="customer" required>
            {% for c in customers %}
            <option value="{{ c.name }}" {% if c.name == order.customer %}selected{% endif %}>{{ c.name }}</option>
            {% endfor %}
            {% if order.customer not in customers | map(attribute='name') | list %}
            <option value="{{ order.customer }}" selected>{{ order.customer }}</option>
            {% endif %}
          </select>
          {% else %}
          <input type="text" name="customer" required value="{{ order.customer }}">
          {% endif %}
        </div>

        <div class="form-group">
          <label>品名 <span class="required">*</span></label>
          <input type="text" name="product" required value="{{ order.product }}">
        </div>

        <div class="form-group">
          <label>数量 <span class="required">*</span></label>
          <input type="number" name="quantity" required min="1" value="{{ order.quantity }}">
        </div>

        <div class="form-group">
          <label>めっき種類 <span class="required">*</span></label>
          <select name="mekki_type" required>
            {% for t in mekki_types %}
            <option value="{{ t }}" {% if t == order.mekki_type %}selected{% endif %}>{{ t }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label>納期 <span class="required">*</span></label>
          <input type="date" name="due_date" required value="{{ order.due_date }}">
        </div>

        <div class="form-group">
          <label>備考</label>
          <textarea name="note">{{ order.note if order.note else '' }}</textarea>
        </div>

        <div class="actions">
          <a href="/detail/{{ order.id }}" class="btn-cancel">キャンセル</a>
          <button type="submit" class="btn-submit">保存する</button>
        </div>

      </form>
    </div>
  </div>
</body>
</html>
